{% extends 'BankApp/base.html' %}
{% load static versioned_static %}

{% block staticfiles %}
    <link rel="stylesheet" href="{% versioned_static 'BankApp/generator.css' %}">
    <script src="{% versioned_static 'BankApp/generator.js' %}" defer></script>
{% endblock %}

{% block content %}

    <div class="container" id="genbody">
        <div id="genbody2">
            <h2>Create Your Exam</h2>
            
            <div style="display: flex; flex-direction: row; flex-wrap: wrap;" id="classes"></div>
        </div>

        <div id="shoppingcart">
            <div id="cart-header">
                <h3>Shopping Cart</h3>
                <button id="clear-cart-btn">Clear</button>
            </div>
            <div id="cart">
                <span><b>Total Questions:</b><p>0</p></span>
            </div>
            <div id="exam-actions-row">
                <div id="exam-count-section">
                    <label for="exam-count-input">Number of Exams</label>
                    <div class="exam-count-controls">
                        <button type="button" class="exam-count-decrement" aria-label="Decrease number of exams">-</button>
                        <input id="exam-count-input" type="number" min="1" max="10" value="1" />
                        <button type="button" class="exam-count-increment" aria-label="Increase number of exams">+</button>
                    </div>
                </div>
                <button class="back" id="preview-button">Preview Exam</button>
            </div>
            <button class="select-button" id="cart-button">Generate Exam</button>
        </div>
    </div>

    <div class="problem-modal-overlay" id="problem-modal-overlay" aria-hidden="true">
        <div class="problem-modal" role="dialog" aria-modal="true" aria-labelledby="problem-modal-title">
            <button class="problem-modal-close" id="problem-modal-close" aria-label="Close problem description">&times;</button>
            <h3 id="problem-modal-title">Problem</h3>
            <p id="problem-modal-description"></p>
            <h4>Example:</h4>
            <p id="problem-modal-example"></p>
            <img id="problem-modal-figure" alt="Problem figure" />
        </div>
    </div>

{% endblock %}
