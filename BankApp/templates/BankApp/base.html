{% load static versioned_static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="{% versioned_static 'BankApp/main.css' %}">
    <script src="{% versioned_static 'BankApp/main.js' %}" defer></script>
    {% block staticfiles %}{% endblock %}
    <title>ESTELA Isomorphic Problem Bank</title>
    <script>
        window.MathJax = {
            tex: {
                inlineMath: [['$', '$'], ['\\(', '\\)']],
                displayMath: [['$$', '$$'], ['\\[', '\\]']]
            }
        };
        window.appUrls = {
            home: "{% url 'home' %}",
            problems: "{% url 'problems' %}",
            generator: "{% url 'generator' %}",
            catalog_api: "{% url 'catalog_api' %}",
            problem_questions_api: "{% url 'problem_questions_api' %}",
            generate_exams_api: "{% url 'generate_exams_api' %}",
            preview_exam_api: "{% url 'preview_exam_api' %}",
            sync_status_api: "{% url 'sync_status_api' %}"
        };
    </script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
</head>
<body>
    <div class="site-chrome">
        <header>
            <div class="container">
                <div class="header-brand">
                    <img class="header-logo" src="{% versioned_static 'BankApp/images/shared/TheTab_KGrgb_72ppi.png' %}" alt="UCF logo">
                    <div class="header-text">
                        <h1>ESTELA Isomorphic Problem Bank</h1>
                        <p></p>
                    </div>
                </div>
            </div>
        </header>
        <nav>
            <div class="container">
                <a href="{% url 'problems' %}">Courses</a>
            </div>
        </nav>
    </div>

    <main class="page-content">{% block content%}{% endblock %}</main>

    <footer>
        <div class="container">
            <p>&copy; 2026 University of Central Florida | <span id="last-sync-footer">Last Sync: Loading...</span></p>
        </div>
    </footer>
</body>
</html>
